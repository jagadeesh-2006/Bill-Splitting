<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Split</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a26;
      --card-hover: #1f1f30;
      --accent: #c8f55a;
      --accent-dim: rgba(200, 245, 90, 0.12);
      --text: #f0f0f5;
      --muted: #6b6b80;
      --border: rgba(255,255,255,0.06);
      --input-bg: rgba(255,255,255,0.04);
      --input-border: rgba(255,255,255,0.1);
      --danger: #f55a8c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 2.5rem;
      backdrop-filter: blur(20px);
      background: rgba(10,10,15,0.8);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .welcome-text {
      font-size: 0.875rem;
      color: var(--muted);
    }
    .welcome-text strong {
      color: var(--text);
      font-weight: 500;
    }

    #logout-btn {
      padding: 0.5rem 1.2rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    #logout-btn:hover { color: var(--danger); border-color: rgba(245,90,140,0.4); }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      min-height: calc(100vh - 61px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      animation: fadeUp 0.5s ease both;
    }

    .section-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    /* Create group form */
    .create-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .create-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, var(--accent-dim), transparent 70%);
      pointer-events: none;
    }

    .create-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    input, select {
      width: 100%;
      padding: 0.7rem 0.9rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 0.75rem;
    }
    input::placeholder { color: var(--muted); }
    input:focus, select:focus {
      border-color: rgba(200,245,90,0.5);
      background: rgba(200,245,90,0.04);
    }
    select option { background: #1a1a26; }

    .btn-accent {
      width: 100%;
      padding: 0.7rem;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.25rem;
    }
    .btn-accent:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,245,90,0.3); }

    /* Groups list */
    .groups-section h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    #groups-ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    #groups-ul li {
      padding: 0.85rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    #groups-ul li::before {
      content: '◈';
      color: var(--accent);
      font-size: 0.7rem;
    }
    #groups-ul li:hover {
      border-color: rgba(200,245,90,0.3);
      background: var(--card-hover);
      transform: translateX(3px);
    }

    /* ── MAIN ── */
    .main {
      padding: 2.5rem;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 400px;
      text-align: center;
      gap: 0.75rem;
    }
    .empty-icon { font-size: 3rem; opacity: 0.3; }
    .empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--muted);
    }
    .empty-state p { font-size: 0.875rem; color: var(--muted); font-weight: 300; }

    /* Group detail */
    #group-detail { display: none; }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    #back-btn {
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    #back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    #group-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .detail-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.5rem;
    }

    .detail-card h4 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 1rem;
    }

    #members-ul, #expenses-ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    #members-ul li {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.875rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    #members-ul li:last-child { border-bottom: none; }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1px solid rgba(200,245,90,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--accent);
      font-weight: 600;
      flex-shrink: 0;
    }

    #expenses-ul li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.875rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
    }
    #expenses-ul li:last-child { border-bottom: none; }

    .expense-info { display: flex; flex-direction: column; gap: 0.15rem; }
    .expense-desc { font-weight: 500; }
    .expense-meta { font-size: 0.75rem; color: var(--muted); }
    .expense-amount { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--accent); }

    /* Add expense form */
    .expense-form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.5rem;
    }

    .expense-form-card h4 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .field { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 500;
      margin-bottom: 0.4rem;
    }

    /* Split type radios */
    .split-type-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .split-type-row label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--input-border);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      color: var(--muted);
      transition: all 0.2s;
    }
    .split-type-row label:has(input:checked) {
      border-color: rgba(200,245,90,0.5);
      background: var(--accent-dim);
      color: var(--accent);
    }
    .split-type-row input[type="radio"] { accent-color: var(--accent); width: auto; margin: 0; }

    #split-inputs {
      margin-bottom: 1rem;
    }
    #split-inputs input { margin-bottom: 0.5rem; }

    /* Result messages */
    #register-result, #login-result {
      margin-top: 0.75rem;
      font-size: 0.82rem;
      text-align: center;
      color: var(--muted);
    }
    .error { color: var(--danger) !important; }
    .success { color: var(--accent) !important; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
      .detail-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      nav { padding: 1rem 1.25rem; }
      .main { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="logo">split<span>.</span></a>
    <div class="nav-right">
      <span class="welcome-text">Hey, <strong id="username"></strong></span>
      <button id="logout-btn">Log out</button>
    </div>
  </nav>

  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- Create Group -->
      <div>
        <p class="section-label">New Group</p>
        <div class="create-card" id="group-creation">
          <h3>Create a group</h3>
          <form id="group-form">
            <input type="text" id="new-group-name" placeholder="Group name" required />
            <input type="text" id="member-phones" placeholder="Member phones (comma separated)" required />
            <button type="submit" class="btn-accent">Create group</button>
          </form>
        </div>
      </div>

      <!-- Groups List -->
      <div class="groups-section" id="groups-list">
        <p class="section-label">Your Groups</p>
        <h3 style="display:none"></h3>
        <ul id="groups-ul"></ul>
      </div>

    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- Empty state (shown when no group selected) -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">◈</div>
        <h3>Select a group</h3>
        <p>Choose a group from the sidebar or create a new one to get started.</p>
      </div>

      <!-- Group Detail -->
      <div id="group-detail">

        <div class="detail-header">
          <button id="back-btn">← Back</button>
          <h3 id="group-name"></h3>
        </div>

        <div class="detail-grid">
          <!-- Members -->
          <div class="detail-card">
            <h4>Members</h4>
            <ul id="members-ul"></ul>
          </div>

          <!-- Expenses -->
          <div class="detail-card">
            <h4>Expenses</h4>
            <ul id="expenses-ul"></ul>
          </div>
        </div>

        <!-- Add Expense -->
        <div class="expense-form-card">
          <h4>Add Expense</h4>
          <form id="expense-form">

            <div class="form-row" style="margin-bottom: 0.75rem;">
              <div class="field">
                <label for="expense-description">Description</label>
                <input type="text" id="expense-description" placeholder="e.g. Dinner" required />
              </div>
              <div class="field">
                <label for="expense-amount">Amount (₹)</label>
                <input type="number" id="expense-amount" step="0.01" min="0" placeholder="0.00" required />
              </div>
            </div>

            <div style="margin-bottom: 1rem;">
              <label for="expense-payer">Paid By</label>
              <select id="expense-payer" required></select>
            </div>

            <div style="margin-bottom: 0.6rem;">
              <label>Split Type</label>
              <div class="split-type-row">
                <label><input type="radio" name="split-type" value="equal" checked /> Equal</label>
                <label><input type="radio" name="split-type" value="percentage" /> Percentage</label>
                <label><input type="radio" name="split-type" value="custom" /> Custom</label>
              </div>
            </div>

            <div id="split-inputs"></div>

            <button type="submit" class="btn-accent">Add expense</button>
          </form>
        </div>

      </div>
    </main>
  </div>

  <script src="scripts/dashboard.js"></script>
</body>
</html>
