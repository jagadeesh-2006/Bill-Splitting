<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Split</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --card: #1a1a26;
      --accent: #c8f55a;
      --accent-dim: rgba(200, 245, 90, 0.12);
      --text: #f0f0f5;
      --muted: #6b6b80;
      --border: rgba(255,255,255,0.06);
      --input-bg: rgba(255,255,255,0.04);
      --input-border: rgba(255,255,255,0.1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      pointer-events: none;
    }
    .blob-1 { width: 400px; height: 400px; background: #5af5c8; top: -10%; right: -10%; }
    .blob-2 { width: 300px; height: 300px; background: var(--accent); bottom: -5%; left: -5%; }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem;
      animation: fadeUp 0.6s ease both;
      position: relative;
      z-index: 1;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: radial-gradient(circle at top right, rgba(90, 245, 200, 0.08), transparent 60%);
      pointer-events: none;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--text);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 2rem;
    }
    .logo span { color: var(--accent); }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.45rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: rgba(200, 245, 90, 0.5);
      background: rgba(200, 245, 90, 0.04);
    }

    /* Two-column row for username + phone */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .btn-submit {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.85rem;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(200,245,90,0.3); }
    .btn-submit:active { transform: translateY(0); }

    #register-result {
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2rem;
      color: var(--muted);
    }
    #register-result.error { color: #f55a8c; }
    #register-result.success { color: var(--accent); }

    .footer-link {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .footer-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .footer-link a:hover { text-decoration: underline; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 400px) {
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <a href="index.html" class="logo">split<span>.</span></a>

    <h2>Create account</h2>
    <p class="subtitle">Join and start splitting expenses with anyone.</p>

    <form id="register-form">
      <div class="field-row">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="e.g. rahul" required />
        </div>
        <div class="field">
          <label for="phone">Phone</label>
          <input type="text" id="phone" placeholder="+91  xxxxx" required />
        </div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn-submit">Create account</button>
    </form>

    <p id="register-result"></p>

    <p class="footer-link">Already have an account? <a href="login.html">Log in</a></p>
  </div>

  <script src="scripts/register.js"></script>
</body>
</html>
